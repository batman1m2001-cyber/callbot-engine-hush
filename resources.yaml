# Hush Resources Configuration
# API keys referenced from .env via ${VAR_NAME}
# Nested format: category → name → config
# Accessed via: hub.get("category:name") or Op(resource="name")

# =============================================================================
# LLM
# =============================================================================

llm:
  default:
    api_type: anthropic
    api_key: ${ANTHROPIC_API_KEY}
    base_url: https://api.anthropic.com
    model: claude-haiku-4-5-20251001

  gpt-4o:
    api_type: openai
    api_key: ${OPENAI_API_KEY}
    base_url: https://api.openai.com/v1
    model: gpt-4o

  claude-haiku:
    api_type: anthropic
    api_key: ${ANTHROPIC_API_KEY}
    base_url: https://api.anthropic.com
    model: claude-haiku-4-5-20251001

  claude-3-haiku:
    api_type: anthropic
    api_key: ${ANTHROPIC_API_KEY}
    base_url: https://api.anthropic.com
    model: claude-3-haiku-20240307

# =============================================================================
# Triton Inference Server
# =============================================================================

triton:
  stt:
    url: ${TRITON_URL:192.168.1.212:8001}
    model: fastconformer_asr

  tts-fastspeech2:
    url: ${TTS_TRITON_URL:192.168.1.212:3001}
    model: fastspeech2

  tts-hifigan:
    url: ${TTS_TRITON_URL:192.168.1.212:3001}
    model: hifigan

# =============================================================================
# ONNX Models (local inference)
# =============================================================================

onnx:
  vad:
    model_path: models/silero_vad.onnx

  denoise:
    model_path: models/denoise.onnx

# =============================================================================
# Embedding
# =============================================================================

embedding:
  openai:
    api_type: openai
    api_key: ${OPENAI_API_KEY}
    base_url: https://api.openai.com/v1/embeddings
    model: text-embedding-3-small
    dimensions: 1536

# =============================================================================
# Observability
# =============================================================================

langfuse:
  default:
    public_key: ${LANGFUSE_PUBLIC_KEY}
    secret_key: ${LANGFUSE_SECRET_KEY}
    host: ${LANGFUSE_HOST}
    enabled: true
    sample_rate: 1.0
