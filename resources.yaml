# =============================================================================
# Embedding Configurations
# =============================================================================

# OpenAI Embeddings
embedding:openai:
  api_type: openai
  api_key: ${OPENAI_API_KEY}
  base_url: https://api.openai.com/v1/embeddings
  model: text-embedding-3-small
  dimensions: 1536

