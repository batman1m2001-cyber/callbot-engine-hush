# Hush Resources Configuration
# API keys are referenced from .env via ${VAR_NAME}
# Format: category:name — used as resource="name" in your workflow

# =============================================================================
# LLM Configurations
# =============================================================================

# Default LLM — used by workflow ops when resource="default"
llm:default:
  api_type: anthropic
  api_key: ${ANTHROPIC_API_KEY}
  base_url: https://api.anthropic.com
  model: claude-haiku-4-5-20251001

# OpenAI GPT-4o
llm:gpt-4o:
  api_type: openai
  api_key: ${OPENAI_API_KEY}
  base_url: https://api.openai.com/v1
  model: gpt-4o

# OpenAI GPT-4o-mini (cheaper, faster — great for testing)
llm:gpt-4o-mini:
  api_type: openai
  api_key: ${OPENAI_API_KEY}
  base_url: https://api.openai.com/v1
  model: gpt-4o-mini

# Anthropic Claude Haiku 4.5 (default for callbot)
llm:claude-haiku:
  api_type: anthropic
  api_key: ${ANTHROPIC_API_KEY}
  base_url: https://api.anthropic.com
  model: claude-haiku-4-5-20251001

# Anthropic Claude 3 Haiku (legacy)
llm:claude-3-haiku:
  api_type: anthropic
  api_key: ${ANTHROPIC_API_KEY}
  base_url: https://api.anthropic.com
  model: claude-3-haiku-20240307

# OpenRouter — Claude Sonnet (access Anthropic via OpenAI-compatible API)
